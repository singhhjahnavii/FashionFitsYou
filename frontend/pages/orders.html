<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — FashionFitsYou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>

  <script src="../js/navbar.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/orders.js"></script>

  <main class="page-content">
    <div class="container">

      <!-- ── Orders List view ── -->
      <div id="list-view">
        <div style="margin-bottom:var(--space-6)">
          <h1 class="orders-page-title">My Orders</h1>
          <p style="color:var(--color-ink-muted);font-size:var(--text-sm)">Track, manage and return your orders</p>
        </div>

        <!-- Status filter tabs -->
        <div class="tabs" style="margin-bottom:var(--space-6)">
          <button class="tab active" data-status="">All Orders</button>
          <button class="tab" data-status="confirmed">Confirmed</button>
          <button class="tab" data-status="shipped">Shipped</button>
          <button class="tab" data-status="delivered">Delivered</button>
          <button class="tab" data-status="cancelled">Cancelled</button>
        </div>

        <div id="orders-list"></div>
        <div id="orders-pagination"></div>
      </div>

      <!-- ── Order Detail view ── -->
      <div id="detail-view" style="display:none">
        <div style="margin-bottom:var(--space-6)">
          <a href="/pages/orders.html" class="btn btn-ghost btn-sm" style="margin-bottom:var(--space-4)">← Back to Orders</a>
        </div>
        <div id="order-detail"></div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__grid">
        <div>
          <span class="footer__logo">FashionFitsYou</span>
          <span class="footer__tagline">Style. Fit. You.</span>
        </div>
        <div class="footer__col"><h4>Shop</h4><ul>
          <li><a href="/pages/products.html?gender=men">Men</a></li>
          <li><a href="/pages/products.html?gender=women">Women</a></li>
        </ul></div>
        <div class="footer__col"><h4>Help</h4><ul>
          <li><a href="#">Returns</a></li>
          <li><a href="#">Contact</a></li>
        </ul></div>
        <div class="footer__col"><h4>Account</h4><ul>
          <li><a href="/pages/profile.html">Profile</a></li>
        </ul></div>
      </div>
      <div class="footer__bottom"><span>© 2025 FashionFitsYou</span></div>
    </div>
  </footer>

  <script>
    // Switch between list and detail based on ?id= param
    document.addEventListener('DOMContentLoaded', () => {
      const id = new URLSearchParams(window.location.search).get('id');
      if (id) {
        document.getElementById('list-view').style.display   = 'none';
        document.getElementById('detail-view').style.display = 'block';
      }
    });
  </script>

</body>
</html>
