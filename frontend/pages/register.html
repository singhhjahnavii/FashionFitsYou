<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — FashionFitsYou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>

  <div class="auth-page">

    <!-- Left visual -->
    <div class="auth-visual">
      <img src="https://images.unsplash.com/photo-1469334031218-e382a71b716b?w=900&q=80" alt="Fashion" loading="lazy">
      <div class="auth-visual__content">
        <a href="../index.html" class="auth-visual__logo">FashionFitsYou</a>
        <span class="auth-visual__tagline">Style. Fit. You.</span>
        <p class="auth-visual__quote">"Style is a way to say who you are without having to speak."</p>
      </div>
    </div>

    <!-- Right form -->
    <div class="auth-form-panel">
      <div class="auth-form-panel__header">
        <h1 class="auth-form-panel__title">Create account</h1>
        <p class="auth-form-panel__sub">
          Already have one? <a href="login.html">Sign in</a>
        </p>
      </div>

      <form class="auth-form" id="register-form" novalidate style="max-width:460px">
        <div class="form-error-global" role="alert"></div>

        <div class="form-group">
          <label class="form-label" for="full_name">Full name</label>
          <input class="form-input" type="text" id="full_name" name="full_name"
                 placeholder="Your full name" autocomplete="name" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" name="email"
                 placeholder="you@example.com" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="gender">I shop for</label>
          <select class="form-select" id="gender" name="gender">
            <option value="">Prefer not to say</option>
            <option value="male">Men's Fashion</option>
            <option value="female">Women's Fashion</option>
            <option value="other">Both / All</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div style="position:relative">
            <input class="form-input" type="password" id="password" name="password"
                   placeholder="Min. 8 characters" autocomplete="new-password"
                   oninput="checkStrength(this.value)" required>
            <button type="button" onclick="togglePwd('password', this)"
                    style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--color-ink-muted);font-size:var(--text-sm)">Show</button>
          </div>
          <div class="password-strength">
            <div class="strength-bar"><div class="strength-fill" id="strength-fill" style="width:0%"></div></div>
            <span class="strength-label" id="strength-label"></span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirm password</label>
          <input class="form-input" type="password" id="confirm_password" name="confirm_password"
                 placeholder="Re-enter password" autocomplete="new-password" required>
        </div>

        <label style="display:flex;align-items:flex-start;gap:var(--space-3);font-size:var(--text-sm);color:var(--color-ink-secondary);cursor:pointer">
          <input type="checkbox" required style="accent-color:var(--color-gold);margin-top:2px;flex-shrink:0">
          <span>I agree to the <a href="#" style="color:var(--color-gold)">Terms of Service</a> and <a href="#" style="color:var(--color-gold)">Privacy Policy</a></span>
        </label>

        <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>

        <div class="auth-divider">or</div>

        <p style="font-size:var(--text-sm);text-align:center;color:var(--color-ink-muted)">
          Already have an account?
          <a href="login.html" style="color:var(--color-gold);font-weight:500">Sign in</a>
        </p>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (auth.isLoggedIn()) window.location.href = 'home.html';
    });

    function togglePwd(id, btn) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? 'Show' : 'Hide';
    }

    function checkStrength(val) {
      const fill  = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      let score = 0;
      if (val.length >= 8)          score++;
      if (/[A-Z]/.test(val))        score++;
      if (/[0-9]/.test(val))        score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const map = [
        [0, '0%',   '', ''],
        [1, '25%',  'var(--color-error)',   'Weak'],
        [2, '50%',  'var(--color-warning)', 'Fair'],
        [3, '75%',  'var(--color-gold)',    'Good'],
        [4, '100%', 'var(--color-success)', 'Strong'],
      ];
      const [, w, c, l] = map[score] || map[0];
      fill.style.width      = w;
      fill.style.background = c;
      label.textContent     = l;
    }
  </script>
</body>
</html>
