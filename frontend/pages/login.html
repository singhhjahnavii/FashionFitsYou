<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — FashionFitsYou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body style="overflow:hidden">

  <div class="auth-page">

    <!-- Left visual panel -->
    <div class="auth-visual">
      <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?w=900&q=80" alt="Fashion" loading="lazy">
      <div class="auth-visual__content">
        <a href="/index.html" class="auth-visual__logo">FashionFitsYou</a>
        <span class="auth-visual__tagline">Style. Fit. You.</span>
        <p class="auth-visual__quote">"Fashion is the armour to survive the reality of everyday life."</p>
      </div>
    </div>

    <!-- Right form panel -->
    <div class="auth-form-panel">
      <div class="auth-form-panel__header">
        <h1 class="auth-form-panel__title">Welcome back</h1>
        <p class="auth-form-panel__sub">
          New here? <a href="/pages/register.html">Create an account</a>
        </p>
      </div>

      <form class="auth-form" id="login-form" novalidate>
        <div class="form-error-global" role="alert"></div>

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" name="email"
                 placeholder="you@example.com" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div style="position:relative">
            <input class="form-input" type="password" id="password" name="password"
                   placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" onclick="togglePwd('password', this)"
                    style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--color-ink-muted);font-size:var(--text-sm)">Show</button>
          </div>
        </div>

        <div style="text-align:right;margin-top:calc(-1 * var(--space-3))">
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg">Sign In</button>

        <div class="auth-divider">or</div>

        <p style="font-size:var(--text-sm);text-align:center;color:var(--color-ink-muted)">
          Don't have an account?
          <a href="/pages/register.html" style="color:var(--color-gold);font-weight:500">Register now</a>
        </p>
      </form>
    </div>

  </div>

  <div id="toast-container"></div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>

  <script>
    // Redirect if already logged in
    document.addEventListener('DOMContentLoaded', () => {
      if (auth.isLoggedIn()) window.location.href = '/pages/home.html';
    });
    function togglePwd(id, btn) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? 'Show' : 'Hide';
    }
  </script>
</body>
</html>
