<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — FashionFitsYou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>

  <script src="../js/navbar.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/product-detail.js"></script>

  <main class="page-content">
    <div class="container container--wide">

      <!-- Breadcrumb -->
      <div id="breadcrumb" style="margin-bottom:var(--space-6)"></div>

      <!-- Product main area (populated by JS) -->
      <div id="product-main"></div>

      <!-- Related products -->
      <div style="margin-top:var(--space-20)">
        <div class="section-header">
          <h2 class="section-title">You Might <span>Also Like</span></h2>
        </div>
        <div id="related-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-5)">
          <div class="skeleton" style="aspect-ratio:3/4;border-radius:var(--radius-md)"></div>
          <div class="skeleton" style="aspect-ratio:3/4;border-radius:var(--radius-md)"></div>
          <div class="skeleton" style="aspect-ratio:3/4;border-radius:var(--radius-md)"></div>
          <div class="skeleton" style="aspect-ratio:3/4;border-radius:var(--radius-md)"></div>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__grid">
        <div>
          <span class="footer__logo">FashionFitsYou</span>
          <span class="footer__tagline">Style. Fit. You.</span>
          <p class="footer__desc">Authentic fashion, delivered to your door.</p>
        </div>
        <div class="footer__col"><h4>Shop</h4><ul>
          <li><a href="/pages/products.html?gender=men">Men</a></li>
          <li><a href="/pages/products.html?gender=women">Women</a></li>
          <li><a href="/pages/products.html?gender=kids">Kids</a></li>
        </ul></div>
        <div class="footer__col"><h4>Help</h4><ul>
          <li><a href="#">Returns</a></li>
          <li><a href="#">Size Guide</a></li>
          <li><a href="#">Contact</a></li>
        </ul></div>
        <div class="footer__col"><h4>Account</h4><ul>
          <li><a href="/pages/orders.html">My Orders</a></li>
          <li><a href="/pages/profile.html">Profile</a></li>
        </ul></div>
      </div>
      <div class="footer__bottom">
        <span>© 2025 FashionFitsYou</span>
        <div class="footer__payments">
          <span class="footer__payment-badge">Razorpay</span>
          <span class="footer__payment-badge">COD</span>
        </div>
      </div>
    </div>
  </footer>

  <script>
    // Load related products after detail loads
    async function loadRelated() {
      const slug = new URLSearchParams(window.location.search).get('slug');
      if (!slug) return;
      try {
        // Wait for product detail to load so we have category
        await new Promise(r => setTimeout(r, 1000));
        const catSlug = document.querySelector('.breadcrumb__link:last-of-type')
          ?.getAttribute('href')?.split('category=')?.[1];
        const data = await api.products.list({
          category: catSlug || '',
          limit: 4,
          sort: 'newest',
        });
        const filtered = (data.products || []).filter(p => p.slug !== slug);
        document.getElementById('related-grid').innerHTML =
          filtered.slice(0,4).map(renderProductCard).join('') ||
          '<p style="grid-column:1/-1;color:var(--color-ink-muted)">No related products found.</p>';
      } catch { document.getElementById('related-grid').innerHTML = ''; }
    }
    document.addEventListener('DOMContentLoaded', loadRelated);
  </script>

</body>

</html>
